name: 📰 News Bot Automator

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour at minute 0
  
  workflow_dispatch:
    inputs:
      max_articles:
        description: 'Maximum articles to process'
        required: false
        default: '5'
      debug:
        description: 'Enable DEBUG logging'
        required: false
        type: boolean
        default: false

# Prevent duplicate parallel runs
concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  run-bot:
    name: 🤖 Run Flux-Titan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Flux-Titan
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: 🚀 Execute Pipeline
        env:
          # Required Secrets
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          
          # Optional Configuration
          MAX_ARTICLES_PER_RUN: ${{ github.event.inputs.max_articles || '5' }}
          GEMINI_MODEL: 'gemini-1.5-flash'
          
          # Force unbuffered Python stdout for real-time logs in Actions
          PYTHONUNBUFFERED: '1'
          LOG_LEVEL: ${{ github.event.inputs.debug == 'true' && 'DEBUG' || 'INFO' }}
        run: |
          echo "::group::Bot Execution Logs"
          flux-titan
          echo "::endgroup::"

      - name: 📊 Generate Action Summary
        if: always()
        run: |
          echo "## 📰 Flux-Titan Execution Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Executed At | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Pipeline Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ Articles Config | ${{ github.event.inputs.max_articles || '5' }} max |" >> $GITHUB_STEP_SUMMARY
          
          # Note: The SQLite database is intentionally NOT committed back to the repository.
          # In a stateless GitHub Actions environment, older historical de-duplication
          # is limited to the current run unless a persistent cache is configured.
